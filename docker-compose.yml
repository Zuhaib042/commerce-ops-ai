services:
  postgres:
    image: postgres:16-alpine
    container_name: commerceops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: commerceops
      POSTGRES_USER: commerceops
      POSTGRES_PASSWORD: commerceops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerceops -d commerceops"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: commerceops-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: commerceops-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://commerceops:commerceops@postgres:5432/commerceops
      API_PORT: 4000
      API_CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
